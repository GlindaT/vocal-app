<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎤 VocalApp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <h2>🎤 VocalApp</h2>

    <button id="btnAfinador" type="button">Afinador</button>
    <button id="btnEstudio" type="button">Estudio</button>
    <button id="btnBiblioteca" type="button">Biblioteca</button>
    <button id="btnKaraoke" type="button">Karaoke</button>
    <button id="btnSplitter" type="button">Splitter</button>
    <button id="btnConfig" type="button">Configuración</button>
  </nav>

  <!-- CONTENIDO -->
  <main class="content">

    <!-- AFINADOR -->
<section id="afinador" class="tab active">
  <h1>🎵 Afinador</h1>
  
  <div class="afinador-container">
    <label for="targetNote">Nota objetivo:</label>
    <select id="targetNote">
      <option value="C">Do (C)</option>
          <option value="C#">Do# (C#)</option>
          <option value="D">Re (D)</option>
          <option value="D#">Re# (D#)</option>
          <option value="E">Mi (E)</option>
          <option value="F">Fa (F)</option>
          <option value="F#">Fa# (F#)</option>
          <option value="G">Sol (G)</option>
          <option value="G#">Sol# (G#)</option>
          <option value="A">La (A)</option>
          <option value="A#">La# (A#)</option>
          <option value="B">Si (B)</option>
        </select>

        <button id="recordBtn">Grabar</button>
        <h2 id="noteDisplay">--</h2>
    <div id="guideText" style="font-size: 24px; font-weight: bold; margin-top: 10px;"></div>
  </div>
</section>
    <!-- ESTUDIO -->
    <section id="estudio" class="tab">
      <h1>🎧 Estudio</h1>

      <input type="file" id="audioFile" accept="audio/*">
      <br><br>

      <audio id="player" controls></audio>
    </section>

    <!-- BIBLIOTECA -->
    <section id="biblioteca" class="tab">
      <h1>📁 Biblioteca</h1>
      <div id="libraryList"></div>
    </section>

    <!-- KARAOKE -->
    <section id="karaoke" class="tab">
      <h1>🎤 Karaoke</h1>

      <input type="file" id="karaokeTrackFile" accept="audio/*">
      <br><br>

      <audio id="karaokeTrack" controls></audio>
    </section>

    <!-- SPLITTER -->
    <section id="splitter" class="tab">
      <h1>✂️ Splitter</h1>

      <input type="file" id="splitterFile" accept="audio/*">
      <br><br>

      <button id="splitBtn">Separar audio</button>
    </section>

    <!-- CONFIG -->
    <section id="config" class="tab">
      <h1>⚙️ Configuración</h1>

      <input
        type="password"
        id="openaiApiKey"
        placeholder="API Key"
      >
      <br><br>

      <button id="saveApiKeyBtn">Guardar</button>
    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
